services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ecommerce-api
    restart: unless-stopped
    env_file:
      - .env
      - .env.docker
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
